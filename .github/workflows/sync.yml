name: Auto Sync Core with Patch

on:
  schedule:
    # Runs at 23:59 UTC daily
    - cron: '59 23 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check for new releases in last 24 hours
        id: check_release
        run: |
          # Get latest release from MetaCubeX/mihomo
          RELEASE_DATA=$(curl -s "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest")
          
          # Extract published date and tag
          PUBLISHED_AT=$(echo "$RELEASE_DATA" | jq -r '.published_at')
          TAG_NAME=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          
          echo "Latest release: $TAG_NAME"
          echo "Published at: $PUBLISHED_AT"
          
          # Convert to timestamp
          RELEASE_TIMESTAMP=$(date -d "$PUBLISHED_AT" +%s)
          CURRENT_TIMESTAMP=$(date +%s)
          TIME_DIFF=$((CURRENT_TIMESTAMP - RELEASE_TIMESTAMP))
          HOURS_DIFF=$((TIME_DIFF / 3600))
          
          echo "Hours since release: $HOURS_DIFF"
          
          # Check if release is within last 24 hours
          if [ $HOURS_DIFF -le 24 ]; then
            echo "New release detected within 24 hours!"
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "version=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            echo "No new release in last 24 hours"
            echo "should_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout fork repository
        if: steps.check_release.outputs.should_sync == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mihomo  # Your fork
          ref: FlClashX
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        if: steps.check_release.outputs.should_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync Meta branch
        if: steps.check_release.outputs.should_sync == 'true'
        run: |
          # Add upstream
          git remote add upstream https://github.com/MetaCubeX/mihomo.git
          git fetch upstream
          
          # Sync Meta branch with upstream
          git checkout Meta || git checkout -b Meta upstream/Meta
          git pull upstream Meta --rebase
          git push origin Meta --force-with-lease

      - name: Sync FlClashX with Meta
        if: steps.check_release.outputs.should_sync == 'true'
        run: |
          git checkout FlClashX
          git merge Meta -m "chore: sync with Meta ${{ steps.check_release.outputs.version }}"
          
      - name: Apply chen08209 patch
        if: steps.check_release.outputs.should_sync == 'true'
        run: |
          # Download patch
          curl -L "https://github.com/chen08209/Clash.Meta/commit/e0cf7fb4e641741592e87890be8427594932535e.patch" \
            -o /tmp/flclash.patch
          
          # Try to apply patch
          if git apply --check /tmp/flclash.patch 2>/dev/null; then
            git apply /tmp/flclash.patch
            git add .
            git commit -m "feat: init FlClash Core ${{ steps.check_release.outputs.version }}"
          else
            echo "Patch cannot be applied cleanly, trying 3-way merge..."
            git apply --3way /tmp/flclash.patch || true
            
            # Check for conflicts
            if git diff --check; then
              git add .
              git commit -m "feat: init FlClash Core ${{ steps.check_release.outputs.version }}"
            else
              echo "::warning::Patch application has conflicts. Manual intervention required."
              exit 1
            fi
          fi

      - name: Push changes
        if: steps.check_release.outputs.should_sync == 'true'
        run: |
          git push origin FlClashX

      - name: Create notification issue (on failure)
        if: failure() && steps.check_release.outputs.should_sync == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Core Sync Failed - ${{ steps.check_release.outputs.version }}`,
              body: `Automatic sync and patch failed for version **${{ steps.check_release.outputs.version }}**.\n\nPlease check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['automation', 'sync-failed']
            })

      - name: Success notification
        if: success() && steps.check_release.outputs.should_sync == 'true'
        run: |
          echo "✅ Successfully synced and patched FlClashX branch with version ${{ steps.check_release.outputs.version }}"
